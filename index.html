<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇大作战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f1423;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  color: #dcebff;
  overflow: hidden;
}
#gameContainer {
  position: relative;
  background: #0f1423;
  border: 2px solid #1a2540;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(0, 180, 160, 0.15);
}
canvas {
  display: block;
  border-radius: 10px;
}
.ui-panel {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 100px;
  background: rgba(20, 28, 48, 0.95);
  border-bottom: 2px solid #1a2540;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
  pointer-events: none;
  border-radius: 10px 10px 0 0;
}
.ui-panel > * { pointer-events: auto; }
.score-box {
  text-align: center;
}
.score-label {
  font-size: 12px;
  color: #6a7a9a;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.score-value {
  font-size: 28px;
  font-weight: bold;
  color: #ffd700;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
}
.hint {
  font-size: 14px;
  color: #1a2540;
}
.overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border-radius: 10px;
  z-index: 10;
}
.overlay h1 {
  font-size: 64px;
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
}
.overlay h2 {
  font-size: 36px;
  margin-bottom: 15px;
}
.overlay p {
  font-size: 18px;
  margin-bottom: 30px;
  color: #b4c6e7;
}
.overlay .subtitle {
  font-size: 20px;
  color: #6a7a9a;
  margin-top: -10px;
  margin-bottom: 40px;
  letter-spacing: 3px;
}
.btn {
  padding: 15px 50px;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin: 8px;
  transition: all 0.2s;
  font-family: inherit;
  color: #0f1423;
  background: #00c8a0;
  box-shadow: 0 4px 15px rgba(0, 200, 160, 0.3);
}
.btn:hover {
  background: #00e6b8;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0, 200, 160, 0.5);
}
.btn:active {
  transform: translateY(0);
}
.instructions {
  margin-top: 40px;
  text-align: center;
  font-size: 16px;
  color: #8a9bba;
  line-height: 2;
}
.instructions .key {
  display: inline-block;
  background: rgba(255, 255, 255, 0.1);
  padding: 2px 8px;
  border-radius: 4px;
  margin: 0 2px;
  font-family: monospace;
  border: 1px solid rgba(255, 255, 255, 0.2);
}
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="900" height="700"></canvas>

  <div class="ui-panel" id="uiPanel">
    <div class="score-box">
      <div class="score-label">得分</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">最高分</div>
      <div class="score-value" id="highScoreDisplay">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">长度</div>
      <div class="score-value" id="lengthDisplay">3</div>
    </div>
    <div class="hint">ESC / P 暂停</div>
  </div>

  <div class="overlay" id="menuOverlay">
    <h1>🐍 贪吃蛇大作战</h1>
    <div class="subtitle">SNAKE RUSH</div>
    <button class="btn" id="startBtn">开始游戏</button>
    <div class="instructions">
      <span class="key">↑↓←→</span> / <span class="key">WASD</span> 控制方向<br>
      <span class="key">SPACE</span> / <span class="key">ENTER</span> 开始 / 重新开始<br>
      <span class="key">ESC</span> / <span class="key">P</span> 暂停 / 继续
    </div>
  </div>

  <div class="overlay hidden" id="pauseOverlay">
    <h2>游戏暂停</h2>
    <p>按 ESC 或 P 继续</p>
  </div>

  <div class="overlay hidden" id="gameOverOverlay">
    <h2 style="color: #ff5050;">游戏结束</h2>
    <p>得分: <span id="finalScore" style="color:#ffd700;font-weight:bold;">0</span></p>
    <p id="newRecord" class="hidden" style="color:#ff5050;font-weight:bold;">🎉 恭喜！新纪录！</p>
    <button class="btn" id="restartBtn">重新开始</button>
    <button class="btn" id="menuBtn">返回菜单</button>
  </div>
</div>

<script>
(() => {
  'use strict';
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const GRID_SIZE = 25;
  const GRID_W = Math.floor(W / GRID_SIZE);
  const GRID_H = Math.floor((H - 100) / GRID_SIZE);
  const OFFSET_Y = 100;
  const FPS = 8;

  const COLORS = {
    black: '#000000', white: '#ffffff', darkBg: '#0f1423',
    gridLine: '#192338', snakeHead: '#00e6b4', snakeBody: '#00b48c',
    snakeTail: '#008c6e', food: '#ff5050', foodGlow: '#ff7878',
    gold: '#ffd700', darkGray: '#283246', lightGray: '#b4c3dc',
    menuBg: '#141c30', button: '#00c8a0', buttonHover: '#00e6b8'
  };

  const state = {
    snake: [],
    direction: { x: 1, y: 0 },
    nextDirection: { x: 1, y: 0 },
    food: { x: 0, y: 0 },
    score: 0,
    highScore: 0,
    gameState: 'MENU',
    frame: 0,
    shake: { x: 0, y: 0 }
  };

  const els = {
    score: document.getElementById('scoreDisplay'),
    highScore: document.getElementById('highScoreDisplay'),
    length: document.getElementById('lengthDisplay'),
    menu: document.getElementById('menuOverlay'),
    pause: document.getElementById('pauseOverlay'),
    gameOver: document.getElementById('gameOverOverlay'),
    finalScore: document.getElementById('finalScore'),
    newRecord: document.getElementById('newRecord')
  };

  function loadHighScore() {
    try { return parseInt(localStorage.getItem('snakeHighScore') || '0'); }
    catch { return 0; }
  }
  function saveHighScore(s) {
    try { localStorage.setItem('snakeHighScore', s); } catch {}
  }

  function resetGame() {
    const sx = Math.floor(GRID_W / 2);
    const sy = Math.floor(GRID_H / 2);
    state.snake = [
      { x: sx, y: sy }, { x: sx - 1, y: sy }, { x: sx - 2, y: sy }
    ];
    state.direction = { x: 1, y: 0 };
    state.nextDirection = { x: 1, y: 0 };
    state.score = 0;
    state.highScore = loadHighScore();
    state.frame = 0;
    state.shake = { x: 0, y: 0 };
    spawnFood();
    updateUI();
  }

  function spawnFood() {
    const used = new Set(state.snake.map(s => `${s.x},${s.y}`));
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * GRID_W),
        y: Math.floor(Math.random() * GRID_H)
      };
    } while (used.has(`${pos.x},${pos.y}`));
    state.food = pos;
  }

  function setDirection(dx, dy) {
    if (state.direction.x === -dx && state.direction.y === -dy) return;
    if (state.direction.x === dx && state.direction.y === dy) return;
    state.nextDirection = { x: dx, y: dy };
  }

  function handleKey(e) {
    const key = e.key;
    if (state.gameState === 'MENU') {
      if (key === ' ' || key === 'Enter') {
        resetGame();
        state.gameState = 'PLAYING';
        hideAllOverlays();
      } else if (key === 'Escape') {
        closeGame();
      }
    } else if (state.gameState === 'PLAYING') {
      if (key === 'Escape' || key === 'p' || key === 'P') {
        state.gameState = 'PAUSED';
        showOverlay(els.pause);
      } else {
        switch (key) {
          case 'ArrowUp': case 'w': case 'W': setDirection(0, -1); break;
          case 'ArrowDown': case 's': case 'S': setDirection(0, 1); break;
          case 'ArrowLeft': case 'a': case 'A': setDirection(-1, 0); break;
          case 'ArrowRight': case 'd': case 'D': setDirection(1, 0); break;
        }
      }
    } else if (state.gameState === 'PAUSED') {
      if (key === 'Escape' || key === 'p' || key === 'P') {
        state.gameState = 'PLAYING';
        hideAllOverlays();
      }
    } else if (state.gameState === 'GAME_OVER') {
      if (key === ' ' || key === 'Enter') {
        resetGame();
        state.gameState = 'PLAYING';
        hideAllOverlays();
      } else if (key === 'Escape') {
        state.gameState = 'MENU';
        showOverlay(els.menu);
      }
    }
  }

  function closeGame() {
    saveHighScore(state.highScore);
    document.body.innerHTML = '<div style="color:#b4c3dc;text-align:center;margin-top:200px;font-size:24px;">游戏已关闭<br><span style="font-size:14px;color:#6a7a9a;">刷新页面可重新开始</span></div>';
  }

  function update() {
    if (state.gameState !== 'PLAYING') return;
    state.direction = state.nextDirection;
    const head = state.snake[0];
    const newHead = { x: head.x + state.direction.x, y: head.y + state.direction.y };

    if (newHead.x < 0 || newHead.x >= GRID_W || newHead.y < 0 || newHead.y >= GRID_H) {
      gameOver(); return;
    }
    if (state.snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
      gameOver(); return;
    }

    state.snake.unshift(newHead);
    if (newHead.x === state.food.x && newHead.y === state.food.y) {
      state.score += 10;
      spawnFood();
    } else {
      state.snake.pop();
    }
    state.frame++;
    updateUI();
  }

  function gameOver() {
    state.gameState = 'GAME_OVER';
    state.shake = { x: (Math.random() - 0.5) * 10, y: (Math.random() - 0.5) * 10 };
    if (state.score > state.highScore) {
      state.highScore = state.score;
      saveHighScore(state.highScore);
    }
    els.finalScore.textContent = state.score;
    if (state.score >= state.highScore && state.score > 0) {
      els.newRecord.classList.remove('hidden');
    } else {
      els.newRecord.classList.add('hidden');
    }
    showOverlay(els.gameOver);
    updateUI();
  }

  function updateUI() {
    els.score.textContent = state.score;
    els.highScore.textContent = state.highScore;
    els.length.textContent = state.snake.length;
  }

  function showOverlay(el) {
    hideAllOverlays();
    el.classList.remove('hidden');
  }
  function hideAllOverlays() {
    [els.menu, els.pause, els.gameOver].forEach(el => el.classList.add('hidden'));
  }

  // Drawing
  function drawGrid() {
    for (let x = 0; x < GRID_W; x++) {
      for (let y = 0; y < GRID_H; y++) {
        const px = x * GRID_SIZE;
        const py = OFFSET_Y + y * GRID_SIZE;
        ctx.fillStyle = (x + y) % 2 === 0 ? COLORS.gridLine : COLORS.darkBg;
        ctx.fillRect(px, py, GRID_SIZE, GRID_SIZE);
        ctx.strokeStyle = COLORS.gridLine;
        ctx.lineWidth = 1;
        ctx.strokeRect(px, py, GRID_SIZE, GRID_SIZE);
      }
    }
  }

  function drawSnake() {
    if (!state.snake.length) return;
    for (let i = state.snake.length - 1; i >= 0; i--) {
      const s = state.snake[i];
      const cx = s.x * GRID_SIZE + GRID_SIZE / 2 + state.shake.x;
      const cy = OFFSET_Y + s.y * GRID_SIZE + GRID_SIZE / 2 + state.shake.y;
      const r = GRID_SIZE / 2 - 2;

      const t = state.snake.length > 1 ? i / (state.snake.length - 1) : 0;
      const color = lerpColor(COLORS.snakeHead, COLORS.snakeTail, 1 - t);

      // shadow
      ctx.beginPath();
      ctx.arc(cx + 2, cy + 2, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fill();

      // body
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = COLORS.white;
      ctx.lineWidth = 2;
      ctx.stroke();

      if (i === 0) drawHead(cx, cy, r);
    }
  }

  function drawHead(cx, cy, r) {
    const d = state.direction;
    const off = r / 3;
    const eyeR = r / 4;
    let eye1, eye2, pup;

    if (d.x === 1) {
      eye1 = { x: cx + off, y: cy - off };
      eye2 = { x: cx + off, y: cy + off };
      pup = eyeR / 2;
    } else if (d.x === -1) {
      eye1 = { x: cx - off, y: cy - off };
      eye2 = { x: cx - off, y: cy + off };
      pup = -eyeR / 2;
    } else if (d.y === -1) {
      eye1 = { x: cx - off, y: cy - off };
      eye2 = { x: cx + off, y: cy - off };
      pup = -eyeR;
    } else {
      eye1 = { x: cx - off, y: cy + off };
      eye2 = { x: cx + off, y: cy + off };
      pup = eyeR;
    }

    [eye1, eye2].forEach(e => {
      ctx.beginPath();
      ctx.arc(e.x, e.y, eyeR, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.white;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(e.x + (d.x !== 0 ? pup : 0), e.y + (d.y !== 0 ? pup : 0), eyeR / 2, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.black;
      ctx.fill();
    });
  }

  function drawFood() {
    const f = state.food;
    const cx = f.x * GRID_SIZE + GRID_SIZE / 2 + state.shake.x;
    const cy = OFFSET_Y + f.y * GRID_SIZE + GRID_SIZE / 2 + state.shake.y;
    const pulse = Math.sin(state.frame * 0.1) * 3;
    const r = GRID_SIZE / 2 - 2 + pulse;

    // glow
    for (let gr = r + 8; gr > r; gr -= 2) {
      const alpha = Math.max(0, Math.min(255, 100 * (gr - r) / 8 | 0));
      ctx.beginPath();
      ctx.arc(cx, cy, gr, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,120,120,${alpha / 255})`;
      ctx.fill();
    }

    // body
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.food;
    ctx.fill();
    ctx.strokeStyle = COLORS.white;
    ctx.lineWidth = 2;
    ctx.stroke();

    // highlight
    ctx.beginPath();
    ctx.arc(cx - r / 3, cy - r / 3, r / 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,200,200,0.8)';
    ctx.fill();
  }

  function lerpColor(c1, c2, t) {
    const hex = s => parseInt(s.slice(1), 16);
    const r1 = (hex(c1) >> 16) & 0xff, g1 = (hex(c1) >> 8) & 0xff, b1 = hex(c1) & 0xff;
    const r2 = (hex(c2) >> 16) & 0xff, g2 = (hex(c2) >> 8) & 0xff, b2 = hex(c2) & 0xff;
    const r = Math.round(r1 + (r2 - r1) * t);
    const g = Math.round(g1 + (g2 - g1) * t);
    const b = Math.round(b1 + (b2 - b1) * t);
    return `rgb(${r},${g},${b})`;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (state.shake.x || state.shake.y) ctx.translate(state.shake.x, state.shake.y);

    drawGrid();
    if (state.gameState === 'PLAYING' || state.gameState === 'PAUSED' || state.gameState === 'GAME_OVER') {
      drawFood();
      drawSnake();
    }

    ctx.restore();
  }

  // Buttons
  document.getElementById('startBtn').addEventListener('click', () => {
    resetGame();
    state.gameState = 'PLAYING';
    hideAllOverlays();
  });
  document.getElementById('restartBtn').addEventListener('click', () => {
    resetGame();
    state.gameState = 'PLAYING';
    hideAllOverlays();
  });
  document.getElementById('menuBtn').addEventListener('click', () => {
    state.gameState = 'MENU';
    showOverlay(els.menu);
  });

  // Events
  window.addEventListener('keydown', handleKey);
  canvas.addEventListener('click', (e) => {
    if (state.gameState !== 'PLAYING') return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    // Optional: tap to change direction (not implemented)
  });

  // Init
  state.highScore = loadHighScore();
  updateUI();
  showOverlay(els.menu);

  // Game loop
  let lastTime = 0;
  const interval = 1000 / FPS;
  function loop(timestamp) {
    const delta = timestamp - lastTime;
    if (delta >= interval) {
      lastTime = timestamp - (delta % interval);
      update();
      draw();
      // decay shake
      state.shake.x *= 0.8;
      state.shake.y *= 0.8;
      if (Math.abs(state.shake.x) < 0.1) state.shake.x = 0;
      if (Math.abs(state.shake.y) < 0.1) state.shake.y = 0;
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
